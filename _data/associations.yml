- organization: Rails Girls Salvador
  role: Mentor
  year: 2019 &mdash; 2020
  url: http://railsgirls.com/salvador.html
  summary: I actively participated in organizing the event in Salvador.
           The Rails Girls initiative aims to give girls the opportunity to get in touch with programming, even without any prior knowledge in the area.
           We believe that by growing initiatives focused on women in programming, we can build a more equal landscape.
           Rails Girls started in Finland and has now grown to a global scale.

- organization: Onda Digital
  role: Instructor
  year: 2019 &mdash; 2020
  url: http://ime.ufba.br/index.php/onda-digital/
  summary: In 2019, with the support of Onda Digital, I taught CIPROG level 2 (Advanced Computer Programming Introduction Course).
           The course aims to improve programming knowledge with a focus on developing computational reasoning in a problem-based and contextualized way,
           encouraging logical-mathematical development and problem-solving skills.
           The course was taught in partnership with the Federal University of Bahia (UFBA) and held at the Institute of Mathematics and Statistics (IME).<br>

